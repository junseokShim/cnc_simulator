# 시뮬레이션 옵션 설정 파일
# 가공 해석, 스톡(소재), 표시 방식, 재생 속도를 제어합니다.

# 소재(스톡) 기본 설정
stock:
  # 원점 기준:
  # - top_center: 상면 중심
  # - top_min_corner: 상면 최소 코너
  # - bottom_center: 바닥 중심
  # - bottom_min_corner: 바닥 최소 코너
  # - center: 소재 중심
  origin_mode: top_center

  # 프로그램 원점 또는 사용자가 지정한 소재 원점 좌표 [X, Y, Z] (mm)
  origin: [0.0, 0.0, 0.0]

  # 소재 실제 크기 [X, Y, Z] (mm)
  size: [120.0, 120.0, 30.0]

  # 역호환용 min/max도 함께 유지합니다.
  # origin/size가 있으면 우선 사용됩니다.
  min: [-60.0, -60.0, -30.0]
  max: [60.0, 60.0, 0.0]

  # Z-map 격자 해상도 (mm/셀)
  # 작게 할수록 footprint가 더 세밀해지지만 메모리/계산량이 증가합니다.
  resolution: 2.0

# 검증 규칙 설정
verification:
  check_rapid_into_stock: true
  check_out_of_bounds: true
  check_missing_tool: true
  check_spindle_off: true
  z_plunge_threshold: 15.0

# 3D/2D 표시 설정
display:
  toolpath_line_width: 2.0
  rapid_color: [0.2, 0.5, 1.0]
  cutting_color: [0.2, 0.9, 0.3]
  arc_color: [1.0, 0.8, 0.2]
  background_color: [0.15, 0.15, 0.18]

# 재생 설정
playback:
  default_speed: 1.0
  max_speed: 10.0
  min_speed: 0.1
  timer_interval: 100

# ============================================================
# 가공 해석 모델 설정 (Altintas 기계론적 절삭력 + 안정성 로브선도 채터 모델)
# ============================================================
# [참고] app/models/cutting_force_model.py  → 스핀들 부하 모델 (Altintas 2000)
#        app/models/chatter_model.py        → 채터 모델 (Altintas & Budak 1995)
#        docs/model_replacement_guide.md    → ML 모델 교체 가이드
# [중요] 아래 값들은 공학적 근사 모델용 파라미터입니다.
# 실제 설비의 FRF 측정값이 있다면 k_n_per_um, zeta, f_natural_hz를 교체하세요.
machining:
  # ---- 기계 프로파일 ----
  # 사용할 기계의 프로파일 ID를 지정합니다.
  # configs/machines/{id}.yaml 파일에서 해당 기계의 특성이 로드됩니다.
  # 새 기계 추가: configs/machines/ 에 YAML 파일 추가 후 model_id 변경
  machine_profile_id: t4000           # DN Solutions T4000 (기본값)

  # ---- 재료 ----
  # aluminum | steel_mild | steel_hard | stainless | titanium | cast_iron | default
  # cutting_force_model.py의 MATERIAL_FORCE_COEFFICIENTS에서 Ktc/Krc 등이 자동 선택됩니다.
  material: aluminum

  # ---- fallback 절삭 조건 (NC에서 추출 불가 시, stock 모델 없을 때 사용) ----
  # [주의] stock_model이 있으면 실제 소재 접촉 기반으로 자동 보정됩니다.
  # stock_model 없을 때만 아래 fallback 값이 사용됩니다.
  default_ae_ratio: 0.5               # 반경방향 맞물림 기본 비율 (ae/D)
  default_ap_mm: 2.0                  # 축방향 절입 기본값 (mm)
  default_flute_count: 4              # 날 수 기본값
  milling_mode: up_milling            # up_milling | down_milling | slotting

  # ---- MRR 정규화 기준 (스핀들 공격성 지수) ----
  mrr_reference_mm3min: 50000.0       # 100% 공격성에 해당하는 MRR 기준값 (mm³/min)

  # ---- 경보 임계값 ----
  high_load_threshold_pct: 80.0       # 스핀들 부하 경보 기준 (%)
  aggressive_ap_ratio: 0.50           # 공격적 절입 깊이 비율 (ap/D)
  aggressive_ae_ratio: 0.65           # 공격적 맞물림 비율 (ae/D)
  unstable_chatter_threshold: 0.65    # 채터 위험 경보 기준 (0~1)
  xy_vibration_warning_um: 12.0       # XY 진동 경보 (μm)
  z_vibration_warning_um: 9.0         # Z 진동 경보 (μm)
  resultant_vibration_warning_um: 16.0 # 합성 진동 경보 (μm)

  # ---- 스톡 탐색 ----
  engagement_sample_count: 7          # 세그먼트당 스톡 샘플 수
  # [참고] 기계별 동특성(강성, 감쇠비, 고유주파수 등)은
  # configs/machines/t4000.yaml 에서 직접 설정합니다.
