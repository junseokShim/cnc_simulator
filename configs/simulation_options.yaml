# 시뮬레이션 옵션 설정 파일
# 시뮬레이션 동작과 표시 방식을 설정합니다.

# 소재(스톡) 기본 설정
stock:
  # 소재 최소 모서리 [X, Y, Z] (mm) - 소재의 한쪽 끝
  min: [-60.0, -60.0, -30.0]
  # 소재 최대 모서리 [X, Y, Z] (mm) - 소재의 반대쪽 끝
  max: [60.0, 60.0, 0.0]
  # Z-맵 격자 해상도 (mm/셀)
  # 작을수록 정밀하지만 메모리와 계산 시간이 증가합니다.
  resolution: 2.0

# 검증 규칙 설정
verification:
  # 급속 이동(G0)이 소재 내부로 진입하는지 검사
  check_rapid_into_stock: true
  # 이동 위치가 머신 이동 범위를 초과하는지 검사
  check_out_of_bounds: true
  # 참조된 공구가 공구 라이브러리에 정의되어 있는지 검사
  check_missing_tool: true
  # 주축 정지 상태에서 절삭 이동이 발생하는지 검사
  check_spindle_off: true
  # 단일 이동에서 허용되는 최대 Z 하강량 (mm)
  z_plunge_threshold: 15.0

# 3D 뷰어 표시 설정
display:
  # 공구경로 선 굵기 (픽셀)
  toolpath_line_width: 2.0
  # 급속 이동 선 색상 [R, G, B] (0.0~1.0)
  rapid_color: [0.2, 0.5, 1.0]
  # 절삭 이동 선 색상 [R, G, B]
  cutting_color: [0.2, 0.9, 0.3]
  # 원호 이동 선 색상 [R, G, B]
  arc_color: [1.0, 0.8, 0.2]
  # 3D 뷰어 배경색 [R, G, B]
  background_color: [0.15, 0.15, 0.18]

# 시뮬레이션 재생 설정
playback:
  # 기본 재생 속도 배율 (1.0 = 정상 속도)
  default_speed: 1.0
  # 최대 재생 속도 배율
  max_speed: 10.0
  # 최소 재생 속도 배율
  min_speed: 0.1
  # 타이머 기본 간격 (ms)
  timer_interval: 100

# 3축 가공 수치 모델 파라미터
# [중요] 이 값들은 공학적 근사 모델의 계수입니다.
# 실제 가공 환경에 맞게 조정하세요.
machining:
  # 가공 재료: aluminum | steel_mild | steel_hard | stainless | titanium | cast_iron | default
  material: "aluminum"

  # 머신 강성 계수 (1.0 = 표준 VMC, 0.7 = 연약한 머신, 1.3 = 고강성 머신)
  # 낮을수록 채터 위험도 증가
  machine_stiffness: 1.0

  # 공구 돌출 계수 (1.0 = L/D < 3 표준, 1.5 = L/D 4~6, 2.0 = L/D > 6)
  # 높을수록 채터 위험도 증가
  tool_overhang_factor: 1.0

  # 스핀들 정격 출력 (W) - 부하 백분율 계산 기준
  spindle_rated_power_w: 7500.0

  # 기본 반경방향 맞물림 비율 (ae/D): 0.5 = 공구 직경의 50%
  # 평면 포켓: 0.5~0.7, 측면 가공: 0.1~0.3
  default_ae_ratio: 0.5

  # Z 변화 없는 구간의 기본 축방향 절입 깊이 (mm)
  default_ap_mm: 2.0

  # 기본 날 수 (공구 정의 없을 때)
  default_flute_count: 4

  # 채터 민감도 배율 (1.0 = 표준, 높을수록 더 보수적 평가)
  chatter_sensitivity: 1.0

  # 스핀들 부하 지수 이동 평균 계수 (0.0~1.0, 클수록 덜 평활화)
  load_smoothing_alpha: 0.3

  # 채터 위험도 가중치 (합계 ≒ 1.0 권장)
  w_engagement: 0.35      # 맞물림 깊이 위험도 가중치
  w_speed: 0.20           # 절삭 속도 위험도 가중치
  w_direction_change: 0.20 # 방향 전환 위험도 가중치
  w_plunge: 0.25          # 절입 위험도 가중치
