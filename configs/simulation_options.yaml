# 시뮬레이션 옵션 설정 파일
# 가공 해석, 스톡(소재), 표시 방식, 재생 속도를 제어합니다.

# 소재(스톡) 기본 설정
stock:
  # 원점 기준:
  # - top_center: 상면 중심
  # - top_min_corner: 상면 최소 코너
  # - bottom_center: 바닥 중심
  # - bottom_min_corner: 바닥 최소 코너
  # - center: 소재 중심
  origin_mode: top_center

  # 프로그램 원점 또는 사용자가 지정한 소재 원점 좌표 [X, Y, Z] (mm)
  origin: [0.0, 0.0, 0.0]

  # 소재 실제 크기 [X, Y, Z] (mm)
  size: [120.0, 120.0, 30.0]

  # 역호환용 min/max도 함께 유지합니다.
  # origin/size가 있으면 우선 사용됩니다.
  min: [-60.0, -60.0, -30.0]
  max: [60.0, 60.0, 0.0]

  # Z-map 격자 해상도 (mm/셀)
  # 작게 할수록 footprint가 더 세밀해지지만 메모리/계산량이 증가합니다.
  resolution: 2.0

# 검증 규칙 설정
verification:
  check_rapid_into_stock: true
  check_out_of_bounds: true
  check_missing_tool: true
  check_spindle_off: true
  z_plunge_threshold: 15.0

# 3D/2D 표시 설정
display:
  toolpath_line_width: 2.0
  rapid_color: [0.2, 0.5, 1.0]
  cutting_color: [0.2, 0.9, 0.3]
  arc_color: [1.0, 0.8, 0.2]
  background_color: [0.15, 0.15, 0.18]

# 재생 설정
playback:
  default_speed: 1.0
  max_speed: 10.0
  min_speed: 0.1
  timer_interval: 100

# AE/AP-aware 가공 해석 모델 설정
# [중요] 아래 값들은 산업용 실측값이 아니라 공학적 근사 모델용 계수입니다.
# 실제 설비 특성에 맞춰 보정하면서 사용하는 것을 권장합니다.
machining:
  # 재료: aluminum | steel_mild | steel_hard | stainless | titanium | cast_iron | default
  material: aluminum

  # 기계/공구 계수
  machine_stiffness: 1.0
  tool_overhang_factor: 1.0

  # 스핀들 정격
  spindle_rated_power_w: 7500.0
  spindle_efficiency: 0.82

  # fallback 절삭 조건
  default_ae_ratio: 0.5
  default_ap_mm: 2.0
  default_flute_count: 4

  # 절삭 해석 기준
  min_chip_thickness_mm: 0.01
  reference_chipload_mm: 0.06
  reference_mrr_mm3_min: 16000.0
  engagement_sample_count: 7

  # 진입 보정 계수
  entry_force_multiplier: 1.15
  plunge_force_multiplier: 1.40
  ramp_force_multiplier: 1.20

  # 축력 분해 계수
  radial_force_ratio_base: 0.42
  radial_force_ratio_gain: 0.22
  axial_force_ratio_base: 0.18
  axial_force_ratio_gain: 0.30

  # 축 강성 (N/um)
  # 기계가 더 강성일수록 같은 힘에서도 진동값이 작게 계산됩니다.
  x_axis_stiffness_n_per_um: 60.0
  y_axis_stiffness_n_per_um: 58.0
  z_axis_stiffness_n_per_um: 85.0

  # 동적 증폭 계수
  dynamic_vibration_gain: 0.85
  chatter_sensitivity: 1.0
  load_smoothing_alpha: 0.3

  # 채터 위험도 가중치
  w_engagement: 0.25
  w_speed: 0.10
  w_direction_change: 0.14
  w_plunge: 0.16
  w_force: 0.18
  w_load_change: 0.10
  w_chipload: 0.07

  # 공격 절삭 / 경보 기준
  high_load_threshold_pct: 80.0
  aggressive_ap_ratio: 0.50
  aggressive_ae_ratio: 0.65
  unstable_chatter_threshold: 0.65

  # 축별 진동 경보 기준 (um)
  xy_vibration_warning_um: 12.0
  z_vibration_warning_um: 9.0
  resultant_vibration_warning_um: 16.0
