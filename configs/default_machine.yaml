# 기본 머신 설정 파일
# 3축 수직 머시닝 센터(VMC)의 기본 사양을 정의합니다.
# 실제 머신에 맞게 수정하여 사용하세요.

name: "3축 수직 머시닝 센터 (기본값)"

# 축별 이동 범위 설정 (mm 단위)
# 머신의 실제 스트로크(행정)에 맞게 설정해야 합니다.
axes:
  X:
    min_travel: -500.0    # X축 최소 이동 한계 (mm)
    max_travel: 500.0     # X축 최대 이동 한계 (mm)
  Y:
    min_travel: -400.0    # Y축 최소 이동 한계 (mm)
    max_travel: 400.0     # Y축 최대 이동 한계 (mm)
  Z:
    min_travel: -300.0    # Z축 최소 이동 한계 (mm)
    max_travel: 100.0     # Z축 최대 이동 한계 (mm)

# 주축 최대 회전수 (RPM)
# 이 값을 초과하는 S-코드는 경고를 발생시킵니다.
max_spindle_rpm: 12000

# 최대 이송 속도 (mm/min)
# F-코드 값이 이를 초과하면 경고가 발생합니다.
max_feedrate: 10000.0

# 급속 이동(G0) 속도 (mm/min)
# 가공 시간 예측에 사용됩니다.
rapid_feedrate: 15000.0

# 제조사 및 모델 정보 (선택적)
manufacturer: "범용"
model: "기본 VMC"
