# 기본 공구 라이브러리
# `tools`는 상세 YAML 형식, `definitions`는 현장식 shorthand 형식입니다.
# shorthand 예:
#   T5 = 12mm EM 4F OH55 L90 RIGID=1.05 KC=0.95

tools:
  - tool_number: 1
    name: "플랫 엔드밀 Ø10"
    tool_type: EM
    tool_category: EM
    diameter_mm: 10.0
    length_mm: 75.0
    flute_length_mm: 25.0
    flute_count: 4
    overhang_mm: 45.0
    rigidity_factor: 1.00
    cutting_coefficient_factor: 1.00
    notes: "기본 포켓 가공용"

  - tool_number: 2
    name: "볼 엔드밀 Ø8"
    tool_type: BALL_END
    tool_category: BALL
    diameter_mm: 8.0
    length_mm: 70.0
    flute_length_mm: 20.0
    corner_radius_mm: 4.0
    flute_count: 2
    overhang_mm: 42.0
    rigidity_factor: 0.95
    cutting_coefficient_factor: 1.00
    notes: "곡면 마무리 가공용"

  - tool_number: 3
    name: "드릴 Ø6"
    tool_type: DR
    tool_category: DR
    diameter_mm: 6.0
    length_mm: 80.0
    flute_length_mm: 40.0
    flute_count: 2
    overhang_mm: 58.0
    rigidity_factor: 0.90
    cutting_coefficient_factor: 1.05
    notes: "드릴링 전용"

  - tool_number: 4
    name: "페이스밀 Ø50"
    tool_type: FACE_MILL
    tool_category: FACE
    diameter_mm: 50.0
    length_mm: 40.0
    flute_length_mm: 6.0
    flute_count: 5
    overhang_mm: 28.0
    rigidity_factor: 1.10
    cutting_coefficient_factor: 1.08
    notes: "평면 가공용"

definitions:
  - "T2 = 5mm EM 4F OH55 L90 RIGID=1.05 KC=0.95"
  - "T3 = 5mm DR 4F OH55 L90 RIGID=1.05 KC=0.95"
  - "T4 = 2mm EM 4F OH55 L90 RIGID=1.05 KC=0.95"
  - "T5 = 5mm DR 4F OH55 L90 RIGID=1.05 KC=0.95"
  - "T6 = 3mm EM 4F OH55 L90 RIGID=1.05 KC=0.95"
  - "T7 = 2.55mm DR 2F OH70 L95 RIGID=0.92 KC=1.03"
  - "T8 = 3mm CM 2F OH70 L95 RIGID=0.92 KC=1.03"
  - "T9 = 3mm TAP 2F OH70 L95 RIGID=0.92 KC=1.03"