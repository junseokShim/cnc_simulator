# CNC 시뮬레이터 프로젝트 예제
project_name: "예제 포켓 가공 프로젝트"
version: "1.0"

# 프로젝트 파일 기준 상대 경로
nc_file: "simple_pocket.nc"

machine:
  name: "3축 VMC"
  axes:
    X: {min_travel: -500.0, max_travel: 500.0}
    Y: {min_travel: -400.0, max_travel: 400.0}
    Z: {min_travel: -300.0, max_travel: 100.0}
  max_spindle_rpm: 12000
  max_feedrate: 10000.0
  rapid_feedrate: 15000.0

stock:
  origin_mode: top_center
  origin: [0.0, 0.0, 0.0]
  size: [120.0, 120.0, 30.0]
  resolution: 2.0

# 기본 라이브러리 파일과 프로젝트 전용 inline 정의를 함께 사용할 수 있습니다.
tool_library_file: "../configs/default_tools.yaml"
tool_library:
  definitions:
    - "T5 = 12mm EM 4F OH55 L90 RIGID=1.05 KC=0.95"
    - "T6 = 10mm EM 4F OH48 L85 RIGID=1.00 KC=1.00"
    - "T7 = 7.5mm DR 2F OH70 L95 RIGID=0.92 KC=1.03"

simulation_options:
  playback_speed: 1.0
  show_stock: true
  check_collisions: true
